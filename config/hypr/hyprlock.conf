# hyprlock — uses the current theme wallpaper as a blurred background.
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.9
    brightness = 0.8
    vignette = 0.2
}

input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.3
    dots_center = true
    rounding = 16
    outer_color = rgba(255255255aa)
    inner_color = rgba(0000007a)
    font_color = rgb(F4EDE0)
    placeholder_text = <span foreground="##F4EDE0">  Locked</span>
    fade_on_empty = false
    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 96
    font_family = JetBrainsMono Nerd Font ExtraBold
    color = rgba(F4EDE0ee)
    position = 0, 180
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    color = rgba(F4EDE0cc)
    position = 0, 90
    halign = center
    valign = center
}
