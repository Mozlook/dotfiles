################################################################################
#  Hyprland — managed by dotfiles. Edit per-host bits in monitors.conf/env.conf.
################################################################################

# Per-host (gitignored, generated by install.sh)
source = ~/.config/hypr/env.conf          # GPU / Wayland env (NVIDIA etc.)
source = ~/.config/hypr/monitors.conf     # monitor layout
# Theme colors (generated by theme-set; borders/shadow follow the palette)
source = ~/.config/hypr/colors.conf

# --- global env --------------------------------------------------------------
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# --- autostart ---------------------------------------------------------------
# (the wallpaper daemon is started by theme-set below, backend-agnostic)
exec-once = waybar
exec-once = swaync
exec-once = systemctl --user start hyprpolkitagent
# network + bluetooth are handled by the waybar modules (rofi wifi menu / blueman-manager);
# the tray applets only duplicated them, so they're intentionally not autostarted.
exec-once = wl-paste --watch cliphist store
exec-once = hypridle
# restore the last selected theme (wallpaper + colors); also starts the wallpaper daemon
exec-once = ~/.local/bin/theme-set "$(cat ~/.cache/theme/current 2>/dev/null || echo cafe)"
# open a terminal on login (exec-once so theme reloads don't keep spawning new ones)
exec-once = kitty

# --- input -------------------------------------------------------------------
input {
    kb_layout = pl
    kb_options = caps:escape
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

# --- look & feel -------------------------------------------------------------
general {
    gaps_in = 4
    gaps_out = 10
    border_size = 2
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.96
    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        vibrancy = 0.15
        noise = 0.01
    }
    shadow {
        enabled = true
        range = 18
        render_power = 3
    }
}

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# --- animations (your curves, kept) -----------------------------------------
animations {
    enabled = yes
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# --- keybindings (ported from your setup) -----------------------------------
$mod = SUPER

bind = $mod, Return, exec, kitty
bind = $mod, C, killactive,
bind = $mod, F, fullscreen,
bind = $mod, M, exit,
bind = $mod, SPACE, exec, rofi -show drun
bind = $mod, B, exec, brave --disable-features=WaylandWpColorManagerV1
bind = $mod, D, exec, discord
bind = $mod, N, exec, nautilus
bind = $mod, L, exec, hyprlock
bind = $mod, O, exec, obsidian
bind = $mod, V, togglefloating,
bind = $mod, P, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mod SHIFT, E, exec, wlogout

# theme / wallpaper picker (SUPER+W is a workspace, so the picker is on T)
bind = $mod, T, exec, ~/.local/bin/wallpaper-picker

# workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, Q, workspace, 4
bind = $mod, W, workspace, 5
bind = $mod, E, workspace, 6
bind = $mod, S, togglespecialworkspace, magic

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, Q, movetoworkspace, 4
bind = $mod SHIFT, W, movetoworkspace, 5
bind = $mod SHIFT, E, movetoworkspace, 6
bind = $mod SHIFT, S, movetoworkspace, special:magic

# move / resize with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# snap / move with arrows
bind = $mod, left, moveactive, exact 0 0
bind = $mod, right, moveactive, exact 50% 0
bind = $mod, down, movewindowpixel, 0 100

# precise keyboard resize
bind = $mod CTRL, left, resizeactive, -50 0
bind = $mod CTRL, right, resizeactive, 50 0
bind = $mod CTRL, up, resizeactive, 0 -50
bind = $mod CTRL, down, resizeactive, 0 50

# media / brightness keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# screenshots
bind = , Print, exec, grim ~/Pictures/screenshot_$(date +'%Y-%m-%d_%H-%M-%S').png
bind = SHIFT, Print, exec, slurp | grim -g - ~/Pictures/screenshot_$(date +'%Y-%m-%d_%H-%M-%S').png
bind = $mod, Print, exec, slurp | grim -g - - | wl-copy
bind = $mod SHIFT, Print, exec, slurp | grim -g - - | swappy -f -

# --- window rules ------------------------------------------------------------
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
