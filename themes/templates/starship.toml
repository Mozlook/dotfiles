# Generated by theme-set — do not edit. Source: themes/templates/starship.toml
add_newline = true
palette = "dynamic"

format = """
[](surface1)\
$os\
$directory\
[](fg:surface1 bg:surface2)\
$git_branch$git_status\
[](fg:surface2 bg:none) \
$character"""

right_format = """$nodejs$python$rust$golang$cmd_duration"""

[palettes.dynamic]
bg = "{{bg}}"
fg = "{{fg}}"
muted = "{{muted}}"
accent = "{{accent}}"
accent2 = "{{accent2}}"
surface1 = "{{surface1}}"
surface2 = "{{surface2}}"
ok = "{{ok}}"
warn = "{{warn}}"
error = "{{error}}"
info = "{{info}}"

[os]
disabled = false
style = "fg:bg bg:surface1"
[os.symbols]
Arch = "󰣇 "
Linux = " "

[directory]
style = "fg:fg bg:surface1"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "fg:accent2 bg:surface2"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "fg:warn bg:surface2"
format = "[$all_status$ahead_behind ]($style)"

[character]
success_symbol = "[](accent)"
error_symbol = "[](error)"

[cmd_duration]
min_time = 500
style = "fg:muted"
format = "[ 󱎫 $duration]($style)"

[nodejs]
symbol = " "
style = "fg:ok"
format = "[ $symbol$version]($style)"

[python]
symbol = " "
style = "fg:info"
format = "[ $symbol$version]($style)"

[rust]
symbol = " "
style = "fg:accent"
format = "[ $symbol$version]($style)"

[golang]
symbol = " "
style = "fg:info"
format = "[ $symbol$version]($style)"
