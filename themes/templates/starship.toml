# Generated by theme-set — do not edit. Source: themes/templates/starship.toml
add_newline = true
palette = "dynamic"

format = """
[](surface1)\
$os\
$directory\
[](fg:surface1 bg:surface2)\
$git_branch\
$git_status\
[](fg:surface2 bg:surface1)\
$nodejs$python$rust$golang\
[](fg:surface1)\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

[palettes.dynamic]
bg = "{{bg}}"
fg = "{{fg}}"
muted = "{{muted}}"
accent = "{{accent}}"
accent2 = "{{accent2}}"
surface1 = "{{surface1}}"
surface2 = "{{surface2}}"
ok = "{{ok}}"
warn = "{{warn}}"
error = "{{error}}"
info = "{{info}}"

[fill]
symbol = "·"
style = "fg:surface2"

[os]
disabled = false
style = "fg:bg bg:surface1"
[os.symbols]
Arch = "󰣇 "
Linux = " "

[directory]
style = "fg:fg bg:surface1"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "fg:accent2 bg:surface2"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "fg:warn bg:surface2"
format = "[$all_status$ahead_behind ]($style)"

[nodejs]
symbol = " "
style = "fg:ok bg:surface1"
format = "[ $symbol$version ]($style)"

[python]
symbol = " "
style = "fg:info bg:surface1"
format = "[ $symbol$version ]($style)"

[rust]
symbol = " "
style = "fg:accent bg:surface1"
format = "[ $symbol$version ]($style)"

[golang]
symbol = " "
style = "fg:info bg:surface1"
format = "[ $symbol$version ]($style)"

[cmd_duration]
min_time = 500
style = "fg:warn"
format = "[ 󱎫 $duration ]($style)"

[time]
disabled = false
time_format = "%H:%M"
style = "fg:muted"
format = "[  $time](fg:muted)"

[character]
success_symbol = "[❯](bold accent)"
error_symbol = "[❯](bold error)"
vimcmd_symbol = "[❮](bold accent2)"
